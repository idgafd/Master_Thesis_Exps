# Run 017 — bidir_rwkv6_conv_nogate vs bidir_rwkv6_layerconv with stronger regularization
# Tests whether heavier SpecAugment + dropout lets layer-dependent conv generalize
# Comparison: run-006 (conv_nogate, CER 0.1760) vs run-014 (layerconv, CER 0.1768)

max_train_hours: 35.0
max_val_hours: 5.0
max_test_hours: 5.0
max_audio_sec: 15.0
min_audio_sec: 0.5
sample_rate: 16000
n_mels: 80
win_length_ms: 25
hop_length_ms: 10

d_model: 256
n_layers: 6
n_heads: 4
head_size: 64
ffn_mult: 5
dropout: 0.25
conv_channels: 256

batch_max_seconds: 240.0
num_epochs: 80
lr: 3.0e-4
weight_decay: 0.01
warmup_steps: 500
grad_clip: 5.0
early_stopping_patience: 20
seed: 42

scheduler_type: cosine

spec_augment: true
freq_mask_param: 27
time_mask_param: 70
num_freq_masks: 2
num_time_masks: 5

chunk_sizes_sec: [2.0, 5.0, 10.0]
max_carry_eval_utterances: 0

output_dir: ./outputs/run-017_layerconv_reg
data_dir: ./data/cv_uk

backbones:
  - bidir_rwkv6_conv_nogate
  - bidir_rwkv6_layerconv
