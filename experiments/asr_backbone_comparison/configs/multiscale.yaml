# ─────────────────────────────────────────────────────────────────────────────
# Run-012: Multi-scale decay — breaking the one-scale-per-dimension bottleneck
#
#   Exp F (headscale): per-head multiplicative decay bias. Zero extra compute.
#       w_scaled = w * exp(bias_h), bias init=0 → baseline at start.
#       Each head's decay spectrum shifts toward local or global.
#
#   Exp E (dual): dual-decay with per-dimension mixing. 2× LION compute.
#       y = α·LION(w_fast) + (1-α)·LION(w_slow), w_slow = w_fast·sigmoid(s)
#       α init≈0.95 → near-baseline at start, learns to mix two scales.
# ─────────────────────────────────────────────────────────────────────────────

# ── Data ─────────────────────────────────────────────────────────────────────
max_train_hours: 35.0
max_val_hours: 5.0
max_test_hours: 5.0
max_audio_sec: 15.0
min_audio_sec: 0.5
sample_rate: 16000
n_mels: 80
win_length_ms: 25
hop_length_ms: 10

# ── Model ────────────────────────────────────────────────────────────────────
d_model: 256
n_layers: 6
n_heads: 4
head_size: 64
ffn_mult: 5
dropout: 0.15
conv_channels: 256

# ── Training ─────────────────────────────────────────────────────────────────
batch_max_seconds: 240.0
num_epochs: 60
lr: 3.0e-4
weight_decay: 0.01
warmup_steps: 500
grad_clip: 5.0
early_stopping_patience: 15
seed: 42

# ── LR Scheduler ─────────────────────────────────────────────────────────────
scheduler_type: cosine

# ── SpecAugment ──────────────────────────────────────────────────────────────
spec_augment: true
freq_mask_param: 15
time_mask_param: 35
num_freq_masks: 2
num_time_masks: 2

# ── Evaluation ───────────────────────────────────────────────────────────────
chunk_sizes_sec: [2.0, 5.0, 10.0]
max_carry_eval_utterances: 0

# ── Paths ────────────────────────────────────────────────────────────────────
output_dir: ./outputs/run-012_multiscale
data_dir: ./data/cv_uk

# ── Mozilla Common Voice Download ────────────────────────────────────────────
cv_api_key: ""
cv_dataset_id: "cmj8u3pys00t5nxxb56wugqgq"
cv_tarball_name: "Common Voice Scripted Speech 24.0 - Ukrainian.tar.gz"

# ── Backbones ────────────────────────────────────────────────────────────────
backbones:
  - bidir_rwkv6_headscale
  - bidir_rwkv6_dual
