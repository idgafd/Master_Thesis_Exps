# ─────────────────────────────────────────────────────────────────────────────
# Experiment: LION bidir_rwkv6_conv_nogate 12L — 100 epochs
#
# run-008 trained for 60 epochs (best_epoch=60, dev CER still declining at end).
# This run extends to 100 epochs with a cosine schedule scaled to T_max=100 epochs,
# so LR remains meaningfully above eta_min through the full training.
# Same warmup and LR adjustments as run-008 (lr=2.5e-4, warmup=1000 steps).
# ─────────────────────────────────────────────────────────────────────────────

max_train_hours: 35.0
max_val_hours: 5.0
max_test_hours: 5.0
max_audio_sec: 15.0
min_audio_sec: 0.5
sample_rate: 16000
n_mels: 80
win_length_ms: 25
hop_length_ms: 10

d_model: 256
n_layers: 12
n_heads: 4
head_size: 64
ffn_mult: 5
dropout: 0.15
conv_channels: 256

batch_max_seconds: 240.0
num_epochs: 100
lr: 2.5e-4
weight_decay: 0.01
warmup_steps: 1000
grad_clip: 5.0
early_stopping_patience: 20
seed: 42

scheduler_type: cosine

spec_augment: true
freq_mask_param: 15
time_mask_param: 35
num_freq_masks: 2
num_time_masks: 2

chunk_sizes_sec: [2.0, 5.0, 10.0]
max_carry_eval_utterances: 0

output_dir: ./outputs/run_lion12_100ep
data_dir: ./data/cv_uk

cv_api_key: ""
cv_dataset_id: "cmj8u3pys00t5nxxb56wugqgq"
cv_tarball_name: "Common Voice Scripted Speech 24.0 - Ukrainian.tar.gz"

backbones:
  - bidir_rwkv6_conv_nogate
