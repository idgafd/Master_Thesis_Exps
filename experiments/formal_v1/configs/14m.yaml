# Formal v1 — 14M-param scale config (matched-shape doubling of depth)
# Differs from default.yaml only in n_layers (6 → 12).  d_model, n_heads,
# head_size, conv_channels unchanged so that per-layer arithmetic shape and
# the head-structure stay identical to 7M for clean ablation comparison.
# Resulting full-model param count ≈ 13.56M (within ~3% of 14M target),
# vs 7.74M for the default 7M config — close to a 1.75× scale.

# ── Data ─────────────────────────────────────────────────────────────────
dataset: librispeech_clean
max_audio_sec: 20.0
min_audio_sec: 0.5
sample_rate: 16000
n_mels: 80
win_length_ms: 25
hop_length_ms: 10

# ── Model ────────────────────────────────────────────────────────────────
d_model: 256
n_layers: 12       # 7M had 6 layers
n_heads: 4
head_size: 64
dropout: 0.1
conv_channels: 256

# ── Training ─────────────────────────────────────────────────────────────
batch_max_seconds: 300
num_epochs: 80
lr: 3.0e-4
weight_decay: 0.01
warmup_steps: 1000
grad_clip: 5.0
early_stopping_patience: 15
seed: 42

# ── SpecAugment (LibriSpeech LD policy) ──────────────────────────────────
spec_augment: true
freq_mask_param: 27
time_mask_param: 100
num_freq_masks: 2
num_time_masks: 2

# ── Evaluation ───────────────────────────────────────────────────────────
chunk_sizes_sec: [2.0, 5.0, 10.0]
max_carry_eval_utterances: 500

# ── Paths ────────────────────────────────────────────────────────────────
output_dir: ./outputs/run_default
data_cache_dir: ./data/librispeech
