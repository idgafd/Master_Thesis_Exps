# Common Voice EN 100h pilot — single source of truth for the 4 pilot runs.
# Hyperparameters are matched to the LibriSpeech 50-ep schedule per
# Master_Plan.md §7 and §10.  No CV-specific tuning by design — the pilot
# tests mechanism transfer at fixed schedule (per task brief §3.3).

# ── Data ─────────────────────────────────────────────────────────────────
dataset: common_voice_en_100h
cv_version: "25.0"                  # cv-corpus-25.0-2026-03-09
max_audio_sec: 20.0
min_audio_sec: 1.0                  # task brief §2.4: drop clips < 1.0 s (vs LibriSpeech's 0.5)
sample_rate: 16000                  # downsampled from CV's 48 kHz at load time
n_mels: 80
win_length_ms: 25
hop_length_ms: 10

# ── Model (7M, 6-layer — matches default.yaml at 7M) ─────────────────────
d_model: 256
n_layers: 6
n_heads: 4
head_size: 64
dropout: 0.1
conv_channels: 256

# ── Training (locked 50-ep matched budget, per Master_Plan §7) ───────────
batch_max_seconds: 300
num_epochs: 50
lr: 3.0e-4
weight_decay: 0.01
warmup_steps: 1000
grad_clip: 5.0
early_stopping_patience: 15
seed: 42

# ── SpecAugment (LibriSpeech LD policy, identical) ───────────────────────
spec_augment: true
freq_mask_param: 27
time_mask_param: 100
num_freq_masks: 2
num_time_masks: 2

# ── Evaluation ───────────────────────────────────────────────────────────
chunk_sizes_sec: [2.0, 5.0, 10.0]
max_carry_eval_utterances: 500

# ── Paths (run_experiment.py overrides output_dir per backbone) ──────────
output_dir: ./outputs/cv_pilot_default_seed42
data_cache_dir: ./data/common_voice
